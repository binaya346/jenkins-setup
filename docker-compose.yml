version: '3.8'

services:
  jenkins:
    build: . 
    container_name: jenkins_server
    restart: unless-stopped
    privileged: true
    user: root # Avoids "Permission Denied" errors on the Docker Socket
    ports:
      - "8080:8080"   
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Xmx2048m -Djava.awt.headless=true
    networks:
      - devops-net

volumes:
  jenkins_home:

networks:
  devops-net:
    driver: bridge
